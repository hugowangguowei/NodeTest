services:
  neo4j:
    image: neo4j:5.22
    container_name: knowledge-visualizer-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/knowledge123
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - ./data:/data
      - ./logs:/logs
